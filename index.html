<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>科中庫存查詢</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'PingFang TC', sans-serif; background: #f5f2ed; color: #2c2416; min-height: 100vh; padding: 0 0 80px; }
  header { background: #2c2416; color: #f5f2ed; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
  .sync-bar { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .sync-dot.ok { background: #4cd97b; }
  .sync-dot.err { background: #ff6b6b; }
  .sync-dot.loading { background: #f0c040; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .card { background: #fff; border-radius: 16px; margin: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(44,36,22,0.07); }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #8a7560; text-transform: uppercase; margin-bottom: 10px; }
  textarea { width: 100%; min-height: 160px; padding: 12px; font-size: 16px; font-family: -apple-system, 'PingFang TC', sans-serif; line-height: 1.7; color: #2c2416; background: #faf8f5; border: 1.5px solid #e0d8cc; border-radius: 12px; resize: none; outline: none; -webkit-appearance: none; }
  textarea:focus { border-color: #8a7560; background: #fff; }
  .hint { font-size: 12px; color: #a0906e; margin-top: 8px; line-height: 1.5; }
  .btn-group { display: flex; gap: 8px; margin-top: 12px; }
  .btn { flex: 1; padding: 14px 8px; font-size: 15px; font-weight: 600; font-family: -apple-system, 'PingFang TC', sans-serif; border: none; border-radius: 12px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; -webkit-appearance: none; }
  .btn:active { opacity: 0.8; transform: scale(0.97); }
  .btn-primary { background: #2c2416; color: #f5f2ed; }
  .btn-ghost { background: #f0ebe3; color: #2c2416; flex: 0 0 auto; padding: 14px 16px; }
  .btn-refresh { background: #e8f0fe; color: #1a56cc; flex: 0 0 auto; padding: 14px 16px; font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .stat { background: #faf8f5; border-radius: 12px; padding: 12px 8px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #8a7560; margin-top: 2px; }
  .n-total { color: #2c2416; } .n-have { color: #2d7a4f; } .n-none { color: #c0392b; }
  .amount-box { border-radius: 12px; padding: 14px 16px; margin-top: 12px; display: flex; align-items: center; gap: 12px; }
  .amount-ok { background: #e8f5ee; } .amount-warn { background: #fef9e7; border: 1.5px solid #f0c040; }
  .amount-icon { font-size: 24px; } .amount-text { flex: 1; }
  .amount-total { font-size: 20px; font-weight: 700; }
  .amount-ok .amount-total { color: #1e6e3e; } .amount-warn .amount-total { color: #b07000; }
  .amount-msg { font-size: 12px; margin-top: 2px; }
  .amount-ok .amount-msg { color: #2d7a4f; } .amount-warn .amount-msg { color: #b07000; font-weight: 600; }
  .section-head { font-size: 13px; font-weight: 700; padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; }
  .head-have { background: #e8f5ee; color: #1e6e3e; } .head-none { background: #fdecea; color: #b03020; }
  .sub-label { font-size: 11px; font-weight: 600; color: #8a7560; letter-spacing: 0.06em; margin: 8px 0 5px 2px; }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .tag { font-size: 14px; padding: 6px 12px; border-radius: 20px; font-weight: 500; }
  .tag-have { background: #e8f5ee; color: #1e6e3e; } .tag-none { background: #fdecea; color: #b03020; }
  .tag-qty { font-size: 12px; opacity: 0.75; margin-left: 3px; }
  .preview-wrap { background: #faf8f5; border: 1.5px solid #e0d8cc; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .preview-wrap pre { font-family: -apple-system, 'PingFang TC', monospace; font-size: 14px; line-height: 1.9; color: #2c2416; white-space: pre-wrap; }
  .btn-copy { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; background: #2d7a4f; color: #fff; border: none; border-radius: 12px; cursor: pointer; -webkit-appearance: none; transition: opacity 0.15s, transform 0.1s; }
  .btn-copy:active { opacity: 0.8; transform: scale(0.98); }
  .foot-note { font-size: 11px; color: #a0906e; text-align: center; margin-top: 10px; line-height: 1.6; }
  .hidden { display: none; }
  #loadingOverlay { position: fixed; inset: 0; background: rgba(44,36,22,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
  .loading-box { background: #fff; border-radius: 16px; padding: 28px 32px; text-align: center; }
  .loading-box p { font-size: 15px; color: #2c2416; margin-top: 12px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0d8cc; border-top-color: #2c2416; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingOverlay" onclick="this.style.display='none'">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>正在載入最新庫存...</p>
    <p style="font-size:12px;color:#8a7560;margin-top:8px;">點任意處關閉</p>
  </div>
</div>

<header>
  <h1>🌿 科中庫存查詢</h1>
  <div class="sync-bar">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncMsg" style="opacity:0.8;">載入中...</span>
  </div>
</header>

<div class="card">
  <div class="card-label">藥品清單</div>
  <textarea id="inputArea" placeholder="直接貼上藥品清單即可，自動分類單方／複方

例如：
延胡索10
補陽還五湯8
荷葉2
陳皮5"></textarea>
  <p class="hint">✦ 品名後直接加數量（如：補陽還五湯8）<br>✦ 自動判斷單方100g／單方200g／複方200g</p>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="checkInventory()">查詢庫存</button>
    <button class="btn btn-refresh" onclick="loadCSV()">🔄 更新</button>
    <button class="btn btn-ghost" onclick="clearAll()">清除</button>
  </div>
</div>

<div id="resultArea" class="hidden">
  <div class="card">
    <div class="card-label">查詢結果</div>
    <div class="stats" id="statsCards"></div>
    <div id="amountBox"></div>
  </div>
  <div class="card hidden" id="haveCard">
    <div class="section-head head-have">📋 訂單確認</div>
    <div id="haveArea"></div>
  </div>
  <div class="card hidden" id="noneCard">
    <div class="section-head head-none">❌ 無庫存／查無品項</div>
    <div id="noneArea"></div>
  </div>
  <div class="card">
    <div class="card-label">傳給客人的訊息</div>
    <div class="preview-wrap"><pre id="previewText"></pre></div>
    <button class="btn-copy" onclick="copyForClient()">複製給客人 📋</button>
    <p class="foot-note" id="footNote">⚠ 庫存每日變動，以實際出單為準</p>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7aEd2Xd24nhhkO5ofpcd-3bt5iFvDCRcya1THku0OvAcd7aQBEP7Cw8r4Q_cupliHCO2eQIYHxd_3/pub?output=csv';
const THRESHOLD = 3330;
let invMap = {};
let lastUpdated = '';

// 分類對照表（固定，不受CSV欄位影響）
const SINGLE100 = new Set(["大黃","大棗","山藥","川芎","川牛膝","三七","丹參","木香","生地黃","玉米鬚","甘草","白朮","白芍","白芷","北板藍根","石菖蒲","何首烏","赤芍","辛夷","防風","牡丹皮","延胡索","金銀花","羌活","知母","香附","厚朴","枳實","紅花","枳殼","苦參","柏子仁","炮附子","穿心蓮","威靈仙","益母草","桔梗","柴胡","秦艽","茯苓","荊芥","桂枝","桑葉","桑白皮","浙貝母","茵陳蒿","夏枯草","栝樓實","魚腥草","乾薑","淫羊藿","陳皮","荷葉","連翹","梔子","菊花","黃耆","黃芩","黃柏","黃連","紫蘇葉","番瀉葉","當歸","葛根","蒼朮","蒼耳子","綿茵陳","蒲黃","蒲公英","廣藿香","熟地黃","澤瀉","獨活","龍膽","薑黃","鎖陽","懷牛膝","黨參","續斷","鬱金"]);
const SINGLE200 = new Set(["麻黃"]);

function getCategory(name) {
  if(SINGLE200.has(name)) return '單方200g';
  if(SINGLE100.has(name)) return '單方100g';
  return '複方200g';
}

function parseCSVLine(line) {
  const result = [];
  let cur = ''; let inQ = false;
  for(let i = 0; i < line.length; i++){
    const c = line[i];
    if(c === '"'){ inQ = !inQ; }
    else if(c === ',' && !inQ){ result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  const newMap = {};
  const lines = text.split('\n');
  lines.forEach(line => {
    const cols = parseCSVLine(line);
    // 掃描所有欄位，找「缺」或「無」的位置
    for(let i = 1; i < cols.length - 1; i++){
      const status = (cols[i]||'').trim().replace(/^"|"$/g,'');
      if(status === '缺' || status === '無'){
        const name = (cols[i-1]||'').trim().replace(/^"|"$/g,'');
        const priceRaw = (cols[i+1]||'').trim().replace(/^"|"$/g,'').replace(/,/g,'');
        const price = parseInt(priceRaw) || 0;
        // 過濾掉非藥名的欄位（數字、標題、空白）
        if(name && name.length >= 2 && isNaN(Number(name)) && !/^[\d劃單複方gml以上每目實際]+$/.test(name)){
          const cat = getCategory(name);
          newMap[name.replace(/\s/g,'')] = {n: name, s: status, p: price, cat: cat};
        }
      }
    }
  });
  return newMap;
}

async function loadCSV() {
  const dot = document.getElementById('syncDot');
  const msg = document.getElementById('syncMsg');
  dot.className = 'sync-dot loading';
  msg.textContent = '更新中...';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    invMap = parseCSV(text);
    const count = Object.keys(invMap).length;
    const now = new Date();
    lastUpdated = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    dot.className = 'sync-dot ok';
    msg.textContent = `已同步 ${count} 項｜${lastUpdated}`;
    document.getElementById('footNote').textContent = `⚠ 庫存每日變動，以實際出單為準｜同步：${lastUpdated}`;
  } catch(e) {
    dot.className = 'sync-dot err';
    msg.textContent = '同步失敗，請點🔄重試';
  }
  document.getElementById('loadingOverlay').style.display = 'none';
}

function norm(s){ return s.replace(/\s+/g,'').replace(/[（）【】()[\]×x、，,。.！!？?]/g,''); }

function parseLine(line){
  const m = line.match(/^(.*?)(\d+)$/);
  if(m && m[1].trim().length > 0) return {name: m[1].trim(), qty: parseInt(m[2])};
  return {name: line.trim(), qty: 1};
}

function checkInventory(){
  if(Object.keys(invMap).length === 0){ alert('庫存尚未載入，請點🔄更新後再試'); return; }
  const raw = document.getElementById('inputArea').value.trim();
  if(!raw) return;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const items = [];
  lines.forEach(line => {
    const {name, qty} = parseLine(line);
    const found = invMap[norm(name)];
    if(found){
      items.push({name, qty, st: found.s==='缺'?'have':'none', price: found.p, cat: found.cat});
    } else {
      items.push({name, qty, st:'miss', price: 0, cat: '查無'});
    }
  });
  renderResults(items);
}

function groupByCategory(items) {
  const order = ['複方200g','單方100g','單方200g','查無'];
  const map = {};
  items.forEach(i => {
    if(!map[i.cat]) map[i.cat] = [];
    map[i.cat].push(i);
  });
  return order.filter(k=>map[k]&&map[k].length).map(k=>({label:k, items:map[k]}));
}

function renderResults(items){
  const haveItems = items.filter(i=>i.st==='have');
  const badItems = items.filter(i=>i.st!=='have');
  let total = 0; let hasTimePrice = false;
  haveItems.forEach(i=>{ if(i.price===0) hasTimePrice=true; else total += i.price*i.qty; });

  document.getElementById('resultArea').classList.remove('hidden');
  document.getElementById('statsCards').innerHTML = `
    <div class="stat"><div class="stat-num n-total">${items.length}</div><div class="stat-lbl">查詢品項</div></div>
    <div class="stat"><div class="stat-num n-have">${haveItems.length}</div><div class="stat-lbl">訂單確認</div></div>
    <div class="stat"><div class="stat-num n-none">${badItems.length}</div><div class="stat-lbl">無庫存／查無</div></div>
  `;

  const amountBox = document.getElementById('amountBox');
  if(haveItems.length > 0){
    const isWarn = total < THRESHOLD;
    amountBox.innerHTML = `
      <div class="amount-box ${isWarn?'amount-warn':'amount-ok'}">
        <div class="amount-icon">${isWarn?'⚠️':'✅'}</div>
        <div class="amount-text">
          <div class="amount-total">訂單合計：$${total.toLocaleString()}${hasTimePrice?' (部分時價未計)':''}</div>
          <div class="amount-msg">${isWarn?`⚠ 未達 $3,330，尚差 $${(THRESHOLD-total).toLocaleString()}`:'已超過 $3,330，沒問題'}</div>
        </div>
      </div>`;
  } else { amountBox.innerHTML=''; }

  const haveCard = document.getElementById('haveCard');
  if(haveItems.length){
    haveCard.classList.remove('hidden');
    document.getElementById('haveArea').innerHTML = groupByCategory(haveItems).map(g=>`
      <div class="sub-label">${g.label}</div>
      <div class="tag-wrap">${g.items.map(i=>`<span class="tag tag-have">${i.name}<span class="tag-qty">×${i.qty}</span></span>`).join('')}</div>
    `).join('');
  } else { haveCard.classList.add('hidden'); }

  const noneCard = document.getElementById('noneCard');
  if(badItems.length){
    noneCard.classList.remove('hidden');
    document.getElementById('noneArea').innerHTML = groupByCategory(badItems).map(g=>`
      <div class="sub-label">${g.label}</div>
      <div class="tag-wrap">${g.items.map(i=>`<span class="tag tag-none">${i.name}<span class="tag-qty">×${i.qty}</span></span>`).join('')}</div>
    `).join('');
  } else { noneCard.classList.add('hidden'); }

  let preview = '📋 訂單確認：\n';
  if(haveItems.length){
    groupByCategory(haveItems).forEach(g=>{ preview+=`【${g.label}】\n`; g.items.forEach(i=>{ preview+=`${i.name} ${i.qty}\n`; }); });
  } else { preview+='（無）\n'; }
  if(badItems.length){
    preview += '\n❌ 無庫存：\n';
    groupByCategory(badItems).forEach(g=>{ preview+=`【${g.label}】\n`; g.items.forEach(i=>{ preview+=`${i.name} ${i.qty}\n`; }); });
  }
  preview += '\n（庫存每日變動，以實際出單為準）';
  document.getElementById('previewText').textContent = preview;
  setTimeout(()=>{ document.getElementById('resultArea').scrollIntoView({behavior:'smooth'}); }, 100);
}

function clearAll(){
  document.getElementById('inputArea').value='';
  document.getElementById('resultArea').classList.add('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyForClient(){
  const text = document.getElementById('previewText').textContent;
  const btn = document.querySelector('.btn-copy');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{ btn.textContent='已複製！✓'; setTimeout(()=>{ btn.textContent='複製給客人 📋'; },2500); });
  } else {
    const ta = document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); btn.textContent='已複製！✓'; setTimeout(()=>{ btn.textContent='複製給客人 📋'; },2500); } catch(e){}
    document.body.removeChild(ta);
  }
}

loadCSV();
</script>
</body>
</html>
